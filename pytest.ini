[pytest]
# Root-level pytest config for tests that live outside src/api/ (e.g. infra
# smoke tests in tests/infra/ and benchmark-harness tests in
# tests/scripts/benchmark/). The API's own tests live under src/api/tests
# and are run via `pytest src/api/` or from within that directory.
testpaths = tests
pythonpath = .
markers =
    infra: opt-in marker for tests that require the local dev stack (Postgres + MinIO) to be running. Gated by `-m infra`.
    integration: opt-in marker for tests that hit the live OHI HTTP API in prod. Gated by `-m integration`; require OHI_API_URL + OHI_EDGE_SECRET env vars to be set. Wave 3 Stream G.2 addition.
asyncio_mode = auto
