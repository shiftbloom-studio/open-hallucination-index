services:
  # 1. Knowledge Graph (Neo4j)
  neo4j:
    image: neo4j:2025.11.2
    container_name: ohi-neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      # Performance Tuning
      - NEO4J_dbms_memory_heap_initial__size=1G
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
    networks:
      - ohi-net

  # 2. Vector Database (Qdrant)
  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: ohi-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - ohi-net

  # 3. Cache (Redis)
  redis:
    image: redis:8.4.0
    container_name: ohi-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./data/redis:/data
    networks:
      - ohi-net

  # 4. vLLM (GPU Accelerated) - The Powerhouse
  vllm:
    image: vllm/vllm-openai@sha256:d623253f2ba246378421c9642e20885e65257f38418ff26d48c81aea1702521b
    container_name: ohi-vllm
    ports:
      - "8000:8000"
    # Shared Memory ist kritisch für PyTorch/NCCL
    ipc: host
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    # Hier passiert die NVIDIA Magie:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      # Model-Cache persistent machen, damit nicht jedes Mal neu geladen wird
      - ~/.cache/huggingface:/root/.cache/huggingface
    # Command für ein effizientes 7B Model (Mistral oder Llama-3)
    # --gpu-memory-utilization 0.8 lässt etwas Platz für Grafik
    command: >
      --model mistralai/Mistral-7B-Instruct-v0.2
      --dtype auto
      --gpu-memory-utilization 0.8
      --max-model-len 4096
    networks:
      - ohi-net

  # 5. Open Hallucination Index API
  ohi-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: open-hallucination-index:local
    container_name: ohi-api
    ports:
      - "8080:8080"
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8080"
      API_WORKERS: "2"

      # Use in-network service names
      LLM_BASE_URL: "http://vllm:8000/v1"
      LLM_MODEL: "mistralai/Mistral-7B-Instruct-v0.2"
      LLM_API_KEY: "${LLM_API_KEY:-no-key-required}"
      OPENAI_API_KEY: "${LLM_API_KEY:-no-key-required}"

      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "password123"

      QDRANT_HOST: "qdrant"
      REDIS_HOST: "redis"

    depends_on:
      - neo4j
      - qdrant
      - redis
      - vllm
    networks:
      - ohi-net

networks:
  ohi-net:
    driver: bridge